{% extends 'base.html' %}

{% block content %}
<main style="padding-top: 100px;">
    <div class="container">
        <h1>Клиенты</h1>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;">
            {% for client in clients %}
                <div style="border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px;">
                    <h3>{{ client.user.username|default:"Гость" }}</h3>
                    <p>Карта: {{ client.discount_card_number|default:"Нет" }}</p>
                    <p>Покупок на: {{ client.total_purchases }} руб.</p>
                    <a href="{% url 'client_detail' client.id %}" class="btn btn-small">Подробнее</a>
                </div>
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
