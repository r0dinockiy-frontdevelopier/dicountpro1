{% extends 'base.html' %}

{% block content %}
<main style="padding-top: 100px;">
    <div class="container">
        <h1>Поставщики</h1>
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;">
            {% for supplier in suppliers %}
                <div style="border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px;">
                    <h3>{{ supplier.name }}</h3>
                    <p>Контакт: {{ supplier.contact_person }}</p>
                    <p>Телефон: {{ supplier.phone }}</p>
                    <a href="{{ supplier.get_absolute_url }}" class="btn btn-small">Смотреть дисконты</a>
                </div>
            {% endfor %}
        </div>
    </div>
</main>
{% endblock %}
